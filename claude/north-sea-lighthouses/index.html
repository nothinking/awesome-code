<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>북해 등대 지도 — North Sea Lighthouse Atlas</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="map-container"></div>

    <aside class="sidebar" id="sidebar">
      <header class="sidebar-header">
        <p class="eyebrow">North Sea Seamark Atlas</p>
        <h1>북해 등대 지도</h1>
        <p class="intro-copy">
          북해 연안 등대의 실제 불빛 색상, 점멸 패턴, 가시거리를 인터랙티브 지도 위에
          시각화합니다. 마커를 클릭하면 상세 정보를 확인할 수 있습니다.
        </p>
      </header>

      <dl class="stat-grid">
        <div><dt>등대 수</dt><dd id="stat-total">0</dd></div>
        <div><dt>표시 중</dt><dd id="stat-visible">0</dd></div>
        <div><dt>중앙값 거리</dt><dd id="stat-median">0 nm</dd></div>
        <div><dt>최대 거리</dt><dd id="stat-longest">0 nm</dd></div>
      </dl>

      <div class="control-group">
        <label class="control-label" for="search-input">이름 검색</label>
        <input id="search-input" type="search" placeholder="Buchan, Lindesnes, Texel…" autocomplete="off" />
      </div>

      <div class="control-group">
        <label class="control-label">최소 가시거리 <strong id="range-value">0 nm</strong></label>
        <input id="range-slider" type="range" min="0" max="30" step="1" value="0" />
      </div>

      <div class="control-group">
        <p class="control-label">주광색 필터</p>
        <div id="colour-filters" class="colour-filters"></div>
      </div>

      <div class="control-group toggles">
        <label class="toggle-control"><input id="toggle-range" type="checkbox" /><span>가시거리 원 표시</span></label>
        <label class="toggle-control"><input id="toggle-labels" type="checkbox" checked /><span>등대 이름 라벨</span></label>
        <label class="toggle-control"><input id="toggle-blink" type="checkbox" checked /><span>점멸 애니메이션</span></label>
      </div>

      <div class="legend-box">
        <p class="control-label">범례</p>
        <div class="legend-items">
          <span class="legend-chip"><span class="dot" style="background:#FFFDE7;box-shadow:0 0 8px #FFFDE7"></span>흰색</span>
          <span class="legend-chip"><span class="dot" style="background:#FF1744;box-shadow:0 0 8px #FF1744"></span>빨간색</span>
          <span class="legend-chip"><span class="dot" style="background:#00E676;box-shadow:0 0 8px #00E676"></span>초록색</span>
          <span class="legend-chip"><span class="dot" style="background:#FFD600;box-shadow:0 0 8px #FFD600"></span>노란색</span>
        </div>
        <p class="legend-note">
          <strong>Fl</strong> 점멸 · <strong>Oc</strong> 차폐 · <strong>Iso</strong> 등시 ·
          <strong>Q</strong> 급점멸 · <strong>F</strong> 고정 · <strong>LFl</strong> 장점멸 ·
          <strong>Mo</strong> 모스
        </p>
      </div>

      <p class="source-note" id="source-note"></p>
    </aside>

    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="사이드바 열기/닫기">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
        <rect x="2" y="4" width="16" height="2" rx="1" fill="currentColor"/>
        <rect x="2" y="9" width="16" height="2" rx="1" fill="currentColor"/>
        <rect x="2" y="14" width="16" height="2" rx="1" fill="currentColor"/>
      </svg>
    </button>

    <script src="./data.js"></script>
    <script src="./light-patterns.js"></script>
    <script src="./main.js"></script>
  </body>
</html>

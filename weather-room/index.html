<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Room</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <canvas id="scene" aria-label="날씨 무드를 시각화하는 Weather Room 캔버스"></canvas>

      <aside class="control-panel" aria-label="Weather Room controls">
        <p class="eyebrow">Atmospheric Interface</p>
        <h1>WEATHER ROOM</h1>
        <p class="panel-copy">
          날씨 상태를 하나의 공간 연출로 바꿔 보는 실험용 앱. 프리셋을 바꾸면
          하늘, 입자, 바닥 반사, 움직임의 템포가 함께 달라진다.
        </p>

        <div class="preset-grid" role="group" aria-label="Weather presets">
          <button class="preset active" data-preset="sunny" type="button">Sunny</button>
          <button class="preset" data-preset="rain" type="button">Rain</button>
          <button class="preset" data-preset="wind" type="button">Wind</button>
          <button class="preset" data-preset="snow" type="button">Snow</button>
          <button class="preset" data-preset="aurora" type="button">Aurora Night</button>
        </div>

        <dl class="status-grid">
          <div>
            <dt>Mode</dt>
            <dd id="mode-value">Sunny</dd>
          </div>
          <div>
            <dt>Particles</dt>
            <dd id="density-value">0</dd>
          </div>
          <div>
            <dt>Drift</dt>
            <dd id="tempo-value">0%</dd>
          </div>
        </dl>

        <p id="preset-copy" class="micro-copy">
          따뜻한 빛과 느린 공기 흐름으로 고요한 실내 아침 장면을 만든다.
        </p>
      </aside>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
